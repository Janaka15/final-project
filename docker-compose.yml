version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: somerset_db
    environment:
      POSTGRES_USER: somerset
      POSTGRES_PASSWORD: somerset_pass
      POSTGRES_DB: somerset_hotel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U somerset -d somerset_hotel"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: somerset_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@somerset.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
